<!DOCTYPE html>
<html>

<head>
    <title>Bootstrap Horizontal Scrollspy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        section {
            height: 400px;
            padding: 20px;
        }
    </style>
</head>

<body data-bs-spy="scroll" data-bs-target="#navbar-example" data-bs-smooth-scroll="true" tabindex="0">

    <!-- Navigation Bar -->
    <nav id="navbar-example" class="navbar navbar-expand-sm bg-dark navbar-dark sticky-top">
        <div class="container-fluid">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="#section1">Section 1</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#section2">Section 2</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#section3">Section 3</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Sections -->
    <section id="section1" class="bg-primary text-white">
        <h2>Section 1</h2>
        <p>Content for Section 1</p>
    </section>

    <section id="section2" class="bg-success text-white">
        <h2>Section 2</h2>
        <p>Content for Section 2</p>
    </section>

    <section id="section3" class="bg-danger text-white">
        <h2>Section 3</h2>
        <p>Content for Section 3</p>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
