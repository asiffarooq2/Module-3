<!DOCTYPE html>
<html>

<head>
    <title>Bootstrap Containers</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container bg-primary text-white p-3 mt-3">
        <h2>Container</h2>
        <p>This is a fixed-width Bootstrap container.</p>
    </div>

    <div class="container-fluid bg-success text-white p-3 mt-3">
        <h2>Container Fluid</h2>
        <p>This is a full-width Bootstrap container.</p>
    </div>

</body>

</html>
