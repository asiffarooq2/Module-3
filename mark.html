<!DOCTYPE html>
<html>

<head>
    <title>Bootstrap Mark and Code Example</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-4">

        <h2>Bootstrap Typography</h2>

        <p>
            This is a <mark>highlighted text</mark> using the mark tag.
        </p>

        <p>
            To create a heading in HTML, use the
            <code>&lt;h1&gt;</code> tag.
        </p>

        <p>
            To create a paragraph, use the
            <code>&lt;p&gt;</code> tag.
        </p>

    </div>

</body>

</html>
