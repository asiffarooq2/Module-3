<!DOCTYPE html>
<html>

<head>
    <title>Bootstrap Carousel Example</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <div id="myCarousel" class="carousel slide" data-bs-ride="carousel">

            <!-- Indicators -->
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="0" class="active"></button>

                <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="1"></button>

                <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="2"></button>
            </div>

            <!-- Slides -->
            <div class="carousel-inner">

                <div class="carousel-item active">
                    <img src="https://via.placeholder.com/800x300?text=Slide+1" class="d-block w-100" alt="Slide 1">
                </div>

                <div class="carousel-item">
                    <img src="https://via.placeholder.com/800x300?text=Slide+2" class="d-block w-100" alt="Slide 2">
                </div>

                <div class="carousel-item">
                    <img src="https://via.placeholder.com/800x300?text=Slide+3" class="d-block w-100" alt="Slide 3">
                </div>

            </div>

            <!-- Previous Button -->
            <button class="carousel-control-prev" type="button" data-bs-target="#myCarousel" data-bs-slide="prev">

                <span class="carousel-control-prev-icon"></span>
            </button>

            <!-- Next Button -->
            <button class="carousel-control-next" type="button" data-bs-target="#myCarousel" data-bs-slide="next">

                <span class="carousel-control-next-icon"></span>
            </button>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
