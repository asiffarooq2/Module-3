<!DOCTYPE html>
<html>

<head>
    <title>Bootstrap Colors and Borders</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-4">

        <h2 class="text-primary">Bootstrap Colors and Borders</h2>

        <!-- Background Colors -->
        <div class="bg-primary text-white p-3 mb-3">
            Primary Background
        </div>

        <div class="bg-success text-white p-3 mb-3">
            Success Background
        </div>

        <div class="bg-danger text-white p-3 mb-3">
            Danger Background
        </div>

        <!-- Borders -->
        <div class="border border-primary p-3 mb-3">
            Primary Border
        </div>

        <div class="border border-success p-3 mb-3">
            Success Border
        </div>

        <div class="border border-danger p-3">
            Danger Border
        </div>

    </div>

</body>

</html>
