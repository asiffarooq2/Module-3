<!DOCTYPE html>
<html>

<head>
    <title>Bootstrap Jumbotron and Buttons</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-4">

        <!-- Jumbotron -->
        <div class="p-5 mb-4 bg-light rounded-3 shadow">
            <h1 class="display-4">Welcome to Bootstrap</h1>
            <p class="lead">
                This is a simple jumbotron-style section created using Bootstrap 5.
            </p>
            <hr>

            <p>
                Learn Bootstrap components, utilities, and responsive design.
            </p>

            <button class="btn btn-primary">
                Learn More
            </button>
        </div>

        <!-- Buttons -->
        <h3>Bootstrap Buttons</h3>

        <button class="btn btn-primary">Primary</button>
        <button class="btn btn-success">Success</button>
        <button class="btn btn-danger">Danger</button>
        <button class="btn btn-warning">Warning</button>
        <button class="btn btn-info">Info</button>
        <button class="btn btn-dark">Dark</button>

    </div>

</body>

</html>
