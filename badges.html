<!DOCTYPE html>
<html>

<head>
    <title>Bootstrap Badges Example</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-4">

        <h2>Bootstrap Badges</h2>

        <h1>Messages <span class="badge bg-primary">5</span></h1>

        <h2>Notifications <span class="badge bg-success">10</span></h2>

        <h3>Updates <span class="badge bg-danger">New</span></h3>

        <button class="btn btn-primary">
            Inbox <span class="badge bg-light text-dark">99+</span>
        </button>

    </div>

</body>

</html>
