<!DOCTYPE html>
<html>

<head>
    <title>Let's Experiment with Grid</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-4">

        <h2 class="text-center mb-4">Bootstrap Grid Experiment</h2>

        <!-- Row 1 -->
        <div class="row mb-3">
            <div class="col-6 bg-primary text-white p-3">
                Column 6
            </div>

            <div class="col-6 bg-success text-white p-3">
                Column 6
            </div>
        </div>

        <!-- Row 2 -->
        <div class="row mb-3">
            <div class="col-4 bg-danger text-white p-3">
                Column 4
            </div>

            <div class="col-4 bg-warning text-dark p-3">
                Column 4
            </div>

            <div class="col-4 bg-info text-white p-3">
                Column 4
            </div>
        </div>

        <!-- Row 3 -->
        <div class="row">
            <div class="col-3 bg-secondary text-white p-3">
                Column 3
            </div>

            <div class="col-9 bg-dark text-white p-3">
                Column 9
            </div>
        </div>

    </div>

</body>

</html>
